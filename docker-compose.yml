version: '3.8'

services:
  # 🐘 Database: เก็บข้อมูล User, Posts, Portfolio และ Gallery
  db:
    image: postgres:16-alpine
    container_name: family-js-db
    restart: always
    environment:
      POSTGRES_USER: family_admin
      POSTGRES_PASSWORD: family_admin
      POSTGRES_DB: family_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # ข้อมูล DB อยู่ที่นี่
    networks:
      - family-network

  # ⚙️ API: NestJS
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: family-js-api
    restart: always
    environment:
      DATABASE_URL: postgresql://family_admin:family_admin@db:5432/family_db?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
      # 🌍 ตั้งใน .env file:
      # FRONTEND_URL=https://family-js.com (production)
      # FRONTEND_URL=http://localhost:3001  (local dev)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
    depends_on:
      - db
    ports:
      - "3000:3000"
    volumes:
      # 🌟 named volume: ไฟล์รูปจะไม่หายแม้ Coolify redeploy หรือ build ใหม่
      - uploads_data:/app/apps/api/public/uploads
    networks:
      - family-network

  # 🚀 Web: Next.js (Standalone)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # 🌍 ตั้งใน .env file:
        # NEXT_PUBLIC_API_URL=https://api.yourdomain.com (production)
        # NEXT_PUBLIC_API_URL=http://localhost:3000     (local dev)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: family-js-web
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      - api
    ports:
      - "3001:3001"
    networks:
      - family-network

networks:
  family-network:
    driver: bridge

volumes:
  postgres_data:   # ข้อมูล Database อยู่ที่นี่
  uploads_data:    # ไฟล์รูป/เอกสารที่ upload ไว้ที่นี่ (ไม่หายแม้ redeploy)


